<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLANB / Image Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-gray-50 text-gray-800">

    <header class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 text-white p-2.5 rounded-xl shadow-md shadow-blue-100">
                    <i class="fa-solid fa-images text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-gray-900">PLANB</h1>
                    <p class="text-xs text-gray-500 font-medium tracking-wide uppercase">Image Library คลังรูปภาพกลาง</p>
                </div>
            </div>
            
            <div class="relative w-full sm:w-80">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
                    <i class="fa-solid fa-magnifying-glass text-sm"></i>
                </span>
                <input type="text" id="search-input" placeholder="ค้นหาชื่อรูปภาพหรือสินค้า..." class="w-full pl-9 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition-all bg-gray-50 focus:bg-white">
            </div>
        </div>
    </header>

    <section class="max-w-7xl mx-auto px-4 py-6">
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-150 flex flex-col md:flex-row gap-4 items-start md:items-center">
            <div class="flex items-center gap-2 text-sm font-semibold text-gray-700 whitespace-nowrap">
                <i class="fa-solid fa-sliders text-blue-600"></i>
                <span>ตัวกรองรูปภาพ:</span>
            </div>
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 w-full">
                <div>
                    <select id="filter-year" class="w-full bg-gray-50 border border-gray-300 text-gray-700 py-2 px-3 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none cursor-pointer">
                        <option value="all">📅 ทุกปี</option>
                    </select>
                </div>
                <div>
                    <select id="filter-month" class="w-full bg-gray-50 border border-gray-300 text-gray-700 py-2 px-3 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none cursor-pointer">
                        <option value="all">🌙 ทุกเดือน</option>
                    </select>
                </div>
                <div>
                    <select id="filter-package" class="w-full bg-gray-50 border border-gray-300 text-gray-700 py-2 px-3 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none cursor-pointer">
                        <option value="all">📦 ทุก Package</option>
                    </select>
                </div>
                <div>
                    <select id="filter-product" class="w-full bg-gray-50 border border-gray-300 text-gray-700 py-2 px-3 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none cursor-pointer">
                        <option value="all">🏷️ ทุกสินค้า</option>
                    </select>
                </div>
            </div>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-4 pb-16">
        
        <div id="loading-state" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-6 animate-pulse">
            <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm">
                <div class="bg-gray-200 aspect-[4/3] w-full"></div>
                <div class="p-4 space-y-2.5">
                    <div class="h-4 bg-gray-200 rounded-md w-3/4"></div>
                    <div class="h-3 bg-gray-200 rounded-md w-1/2"></div>
                </div>
            </div>
            <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm">
                <div class="bg-gray-200 aspect-[4/3] w-full"></div>
                <div class="p-4 space-y-2.5">
                    <div class="h-4 bg-gray-200 rounded-md w-3/4"></div>
                    <div class="h-3 bg-gray-200 rounded-md w-1/2"></div>
                </div>
            </div>
            <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm">
                <div class="bg-gray-200 aspect-[4/3] w-full"></div>
                <div class="p-4 space-y-2.5">
                    <div class="h-4 bg-gray-200 rounded-md w-3/4"></div>
                    <div class="h-3 bg-gray-200 rounded-md w-1/2"></div>
                </div>
            </div>
            <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm">
                <div class="bg-gray-200 aspect-[4/3] w-full"></div>
                <div class="p-4 space-y-2.5">
                    <div class="h-4 bg-gray-200 rounded-md w-3/4"></div>
                    <div class="h-3 bg-gray-200 rounded-md w-1/2"></div>
                </div>
            </div>
        </div>

        <div id="image-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-6 hidden">
