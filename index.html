<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLANB / Image Library</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap');

    :root{
        --canvas:#000000;
        --surface-soft:#0d0d0d;
        --surface-card:#1a1a1a;
        --surface-elevated:#262626;
        --hairline:#3c3c3c;
        --hairline-strong:#262626;
        --body:#bbbbbb;
        --body-strong:#e6e6e6;
        --muted:#7e7e7e;
        --m-blue-light:#0066b1;
        --m-blue-dark:#1c69d4;
        --m-red:#e22718;
    }

    * { font-family: 'Sarabun', sans-serif; }
    body { background-color: var(--canvas); color: var(--body); }

    .m-stripe{ height:4px; background: linear-gradient(90deg, var(--m-blue-light) 0%, var(--m-blue-light) 33%, var(--m-blue-dark) 33%, var(--m-blue-dark) 66%, var(--m-red) 66%, var(--m-red) 100%); }

    .display-headline{ font-weight:700; letter-spacing:0; text-transform:uppercase; color:#ffffff; }
    .label-uppercase{ font-weight:700; letter-spacing:1.5px; text-transform:uppercase; font-size:12px; }
    .body-light{ font-weight:300; color:var(--body); }

    .surface-card{ background-color:var(--surface-card); border:1px solid var(--hairline); }
    .surface-soft{ background-color:var(--surface-soft); }

    select, input{ font-weight:300; }
    ::placeholder{ color:var(--muted); }

    .skeleton{ background-color: var(--surface-card); }
    .skeleton-pulse{ animation: pulse 1.6s ease-in-out infinite; }
    @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.4;} }

    .image-card{ transition: transform .15s ease, border-color .15s ease; cursor:pointer; }
    .image-card:hover{ transform: translateY(-2px); border-color:#ffffff; }

    .btn-primary{ background:transparent; color:#fff; border:1px solid #fff; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; font-size:13px; }
    .btn-primary:hover{ background:#fff; color:#000; }
</style>
</head>
<body class="min-h-screen">

    <header class="bg-black sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 pt-5 pb-4 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="border border-white text-white p-2.5 flex items-center justify-center">
                    <i class="fa-solid fa-images text-lg"></i>
                </div>
                <div>
                    <h1 class="text-2xl display-headline leading-none">PLANB</h1>
                    <p class="label-uppercase mt-1" style="color:var(--muted);">Image Library &middot; คลังรูปภาพกลาง</p>
                </div>
            </div>

            <div class="relative w-full sm:w-80">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none" style="color:var(--muted);">
                    <i class="fa-solid fa-magnifying-glass text-sm"></i>
                </span>
                <input type="text" id="search-input" placeholder="ค้นหาชื่อรูปภาพหรือสินค้า..." class="w-full pl-9 pr-4 py-2.5 surface-card text-white text-sm outline-none focus:border-white transition-colors" style="border-radius:0;">
            </div>
        </div>
        <div class="m-stripe"></div>
    </header>

    <section class="max-w-7xl mx-auto px-4 py-6">
        <div class="surface-card p-4 flex flex-col md:flex-row gap-4 items-start md:items-center">
            <div class="flex items-center gap-2 label-uppercase text-white whitespace-nowrap">
                <i class="fa-solid fa-sliders"></i>
                <span>ตัวกรองรูปภาพ</span>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 w-full">
                <div>
                    <select id="filter-year" class="w-full surface-soft border text-white py-2 px-3 text-sm outline-none focus:border-white cursor-pointer" style="border-radius:0; border-color:var(--hairline);">
                        <option value="">📅 ทุกปี</option>
                    </select>
                </div>
                <div>
                    <select id="filter-month" class="w-full surface-soft border text-white py-2 px-3 text-sm outline-none focus:border-white cursor-pointer" style="border-radius:0; border-color:var(--hairline);">
                        <option value="">🌙 ทุกเดือน</option>
                    </select>
                </div>
                <div>
                    <select id="filter-package" class="w-full surface-soft border text-white py-2 px-3 text-sm outline-none focus:border-white cursor-pointer" style="border-radius:0; border-color:var(--hairline);">
                        <option value="">📦 ทุก Package</option>
                    </select>
                </div>
                <div>
                    <select id="filter-product" class="w-full surface-soft border text-white py-2 px-3 text-sm outline-none focus:border-white cursor-pointer" style="border-radius:0; border-color:var(--hairline);">
                        <option value="">🏷️ ทุกสินค้า</option>
                    </select>
                </div>
            </div>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-4 pb-20">

        <div id="loading-state" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-6">
            <div class="surface-card overflow-hidden skeleton-pulse">
                <div class="skeleton aspect-[4/3] w-full"></div>
                <div class="p-4 space-y-2.5">
                    <div class="h-4 skeleton w-3/4"></div>
                    <div class="h-3 skeleton w-1/2"></div>
                </div>
            </div>
            <div class="surface-card overflow-hidden skeleton-pulse">
                <div class="skeleton aspect-[4/3] w-full"></div>
                <div class="p-4 space-y-2.5">
                    <div class="h-4 skeleton w-3/4"></div>
                    <div class="h-3 skeleton w-1/2"></div>
                </div>
            </div>
            <div class="surface-card overflow-hidden skeleton-pulse">
                <div class="skeleton aspect-[4/3] w-full"></div>
                <div class="p-4 space-y-2.5">
                    <div class="h-4 skeleton w-3/4"></div>
                    <div class="h-3 skeleton w-1/2"></div>
                </div>
            </div>
            <div class="surface-card overflow-hidden skeleton-pulse">
                <div class="skeleton aspect-[4/3] w-full"></div>
                <div class="p-4 space-y-2.5">
                    <div class="h-4 skeleton w-3/4"></div>
                    <div class="h-3 skeleton w-1/2"></div>
                </div>
            </div>
        </div>

        <div id="result-count" class="label-uppercase mb-4 hidden" style="color:var(--muted);"></div>

        <div id="image-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-6 hidden"></div>

        <div id="empty-state" class="hidden flex flex-col items-center justify-center text-center py-24" style="color:var(--muted);">
            <i class="fa-solid fa-camera-retro text-4xl mb-4"></i>
            <p class="body-light">ไม่พบรูปภาพที่ตรงกับเงื่อนไข</p>
        </div>

        <div id="setup-notice" class="hidden surface-card p-8 text-center">
            <h3 class="display-headline text-lg mb-2">⚙ ยังไม่ได้เชื่อมต่อ Backend</h3>
            <p class="body-light text-sm">กรุณาตั้งค่า APPS_SCRIPT_URL ในไฟล์นี้ให้เป็น URL ของ Apps Script Web App<br>ที่ deploy จากโฟลเดอร์ Google Drive ของคุณ</p>
        </div>

    </main>

    <footer class="bg-black">
        <div class="m-stripe"></div>
        <div class="max-w-7xl mx-auto px-4 py-8 flex flex-col sm:flex-row justify-between items-center gap-3">
            <p class="label-uppercase" style="color:var(--muted);">PLANB &middot; Image Library</p>
            <p class="body-light text-xs" style="color:var(--muted);">คลังรูปภาพกลางสำหรับทีมงาน</p>
        </div>
    </footer>

<script>
    // === ตั้งค่าตรงนี้ ===
    const APPS_SCRIPT_URL = https://script.google.com/macros/s/AKfycbzgtRxRa9eUZHS-31AQ7JSCd3LaGIbDa3IawUZTzT64PK5hOd__RCO3-c_aCre_5HBgYA/exec';
    // ====================

    let allFiles = [];

    const THAI_MONTHS = {
        'มกราคม': 1, 'กุมภาพันธ์': 2, 'มีนาคม': 3, 'เมษายน': 4,
        'พฤษภาคม': 5, 'มิถุนายน': 6, 'กรกฎาคม': 7, 'สิงหาคม': 8,
        'กันยายน': 9, 'ตุลาคม': 10, 'พฤศจิกายน': 11, 'ธันวาคม': 12
    };
    const ENG_MONTHS = { jan:1, feb:2, mar:3, apr:4, may:5, jun:6, jul:7, aug:8, sep:9, oct:10, nov:11, dec:12 };
    const MONTH_LABEL_TH = ['', 'มกราคม (Jan)', 'กุมภาพันธ์ (Feb)', 'มีนาคม (Mar)', 'เมษายน (Apr)', 'พฤษภาคม (May)', 'มิถุนายน (Jun)', 'กรกฎาคม (Jul)', 'สิงหาคม (Aug)', 'กันยายน (Sep)', 'ตุลาคม (Oct)', 'พฤศจิกายน (Nov)', 'ธันวาคม (Dec)'];

    function extractYearMonth(pathStr) {
        let year = null, month = null;
        if (!pathStr) return { year, month };

        for (const name in THAI_MONTHS) {
            if (pathStr.includes(name)) {
                month = THAI_MONTHS[name];
                const re = new RegExp(name + '\\s*(\\d{2})');
                const m = pathStr.match(re);
                if (m) year = 1957 + parseInt(m[1], 10);
                break;
            }
        }

        if (!month) {
            const re = /\b(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*\s*(\d{2,4})\b/i;
            const m = pathStr.match(re);
            if (m) {
                month = ENG_MONTHS[m[1].toLowerCase()];
                let y = parseInt(m[2], 10);
                if (y < 100) y = 2000 + y;
                year = y;
            }
        }

        if (!year) {
            const ym = pathStr.match(/\b(20\d{2})\b/);
            if (ym) year = parseInt(ym[1], 10);
        }

        return { year, month };
    }

    function extractPackage(pathStr) {
        if (!pathStr) return null;
        const m = pathStr.match(/Pic Retouch\s*@\s*([^\/]+)/i);
        return m ? m[1].trim() : null;
    }

    function loadImages() {
        fetch(APPS_SCRIPT_URL)
            .then(res => {
                if (!res.ok) throw new Error('Network response was not ok');
                return res.json();
            })
            .then(data => {
                allFiles = data.map(f => {
                    const ym = extractYearMonth(f.path || f.campaign || '');
                    const pkg = extractPackage(f.path || f.campaign || '');
                    return { ...f, year: ym.year, month: ym.month, packageName: pkg };
                });
                updateFilterOptions();
                displayGrid(allFiles);
            })
            .catch(err => {
                console.error(err);
                showSetupNotice();
            });
    }

    function getFilesForOptions(excludeKey) {
        const term = document.getElementById('search-input').value.toLowerCase();
        const campaign = document.getElementById('filter-product').value;
        const year = document.getElementById('filter-year').value;
        const month = document.getElementById('filter-month').value;
        const pkg = document.getElementById('filter-package').value;

        return allFiles.filter(f => {
            const nameMatch = f.name.toLowerCase().includes(term);
            const pathMatch = (f.path || '').toLowerCase().includes(term);
            const matchesTerm = !term || nameMatch || pathMatch;
            const matchesCampaign = excludeKey === 'campaign' || !campaign || f.campaign === campaign;
            const matchesYear = excludeKey === 'year' || !year || String(f.year) === year;
            const matchesMonth = excludeKey === 'month' || !month || String(f.month) === month;
            const matchesPackage = excludeKey === 'package' || !pkg || f.packageName === pkg;
            return matchesTerm && matchesCampaign && matchesYear && matchesMonth && matchesPackage;
        });
    }

    function rebuildSelect(selectEl, values, allLabel, currentValue) {
        selectEl.innerHTML = `<option value="">${allLabel}</option>`;
        values.forEach(v => {
            const opt = document.createElement('option');
            opt.value = v.value;
            opt.textContent = v.label;
            selectEl.appendChild(opt);
        });
        if (currentValue && values.some(v => String(v.value) === currentValue)) {
            selectEl.value = currentValue;
        } else {
            selectEl.value = '';
        }
    }

    function updateFilterOptions() {
        const yearSelect = document.getElementById('filter-year');
        const monthSelect = document.getElementById('filter-month');
        const packageSelect = document.getElementById('filter-package');
        const campaignSelect = document.getElementById('filter-product');

        const prevYear = yearSelect.value;
        const prevMonth = monthSelect.value;
        const prevPackage = packageSelect.value;
        const prevCampaign = campaignSelect.value;

        const yearFiles = getFilesForOptions('year');
        const years = [...new Set(yearFiles.map(f => f.year).filter(Boolean))]
            .sort((a, b) => a - b)
            .map(y => ({ value: y, label: String(y) }));
        rebuildSelect(yearSelect, years, `📅 ทุกปี (${years.length})`, prevYear);

        const monthFiles = getFilesForOptions('month');
        const months = [...new Set(monthFiles.map(f => f.month).filter(Boolean))]
            .sort((a, b) => a - b)
            .map(m => ({ value: m, label: MONTH_LABEL_TH[m] }));
        rebuildSelect(monthSelect, months, `🌙 ทุกเดือน (${months.length})`, prevMonth);

        const packageFiles = getFilesForOptions('package');
        const packages = [...new Set(packageFiles.map(f => f.packageName).filter(Boolean))]
            .sort()
            .map(p => ({ value: p, label: p }));
        rebuildSelect(packageSelect, packages, `📦 ทุก Package (${packages.length})`, prevPackage);

        const campaignFiles = getFilesForOptions('campaign');
        const campaigns = [...new Set(campaignFiles.map(f => f.campaign).filter(Boolean))]
            .sort()
            .map(c => ({ value: c, label: c }));
        rebuildSelect(campaignSelect, campaigns, `🏷️ ทุกสินค้า (${campaigns.length})`, prevCampaign);
    }

    function showSetupNotice() {
        document.getElementById('loading-state').classList.add('hidden');
        document.getElementById('image-grid').classList.add('hidden');
        document.getElementById('empty-state').classList.add('hidden');
        document.getElementById('setup-notice').classList.remove('hidden');
    }

    function displayGrid(files) {
        document.getElementById('loading-state').classList.add('hidden');
        const grid = document.getElementById('image-grid');
        const empty = document.getElementById('empty-state');
        const count = document.getElementById('result-count');

        if (files.length === 0) {
            grid.classList.add('hidden');
            count.classList.add('hidden');
            empty.classList.remove('hidden');
            return;
        }

        empty.classList.add('hidden');
        count.classList.remove('hidden');
        count.textContent = `พบ ${files.length} รูปภาพ`;

        let gridHtml = '';
        files.forEach(file => {
            const imgSrc = `https://drive.google.com/thumbnail?id=${file.id}&sz=w400`;
            const pathParts = (file.path || file.campaign || '').split(' / ').filter(Boolean);
            const breadcrumbHtml = pathParts.map(p => `<span class="label-uppercase px-2 py-0.5 border" style="border-color:var(--hairline); color:var(--muted); font-size:10px; letter-spacing:1px;">${p}</span>`).join('');
            gridHtml += `
                <div class="image-card surface-card overflow-hidden" onclick="window.open('https://drive.google.com/file/d/${file.id}/view', '_blank')">
                    <div class="w-full aspect-[4/3] overflow-hidden surface-soft">
                        <img src="${imgSrc}" alt="${file.name}" loading="lazy" class="w-full h-full object-cover">
                    </div>
                    <div class="p-4 space-y-2">
                        <div class="text-white text-sm font-bold truncate" title="${file.name}">${file.name}</div>
                        <div class="flex flex-wrap gap-1.5">${breadcrumbHtml}</div>
                    </div>
                </div>
            `;
        });

        grid.innerHTML = gridHtml;
        grid.classList.remove('hidden');
    }

    function filterImages() {
        const term = document.getElementById('search-input').value.toLowerCase();
        const campaign = document.getElementById('filter-product').value;
        const year = document.getElementById('filter-year').value;
        const month = document.getElementById('filter-month').value;
        const pkg = document.getElementById('filter-package').value;

        const filtered = allFiles.filter(f => {
            const nameMatch = f.name.toLowerCase().includes(term);
            const pathMatch = (f.path || '').toLowerCase().includes(term);
            const matchesTerm = !term || nameMatch || pathMatch;
            const matchesCampaign = !campaign || f.campaign === campaign;
            const matchesYear = !year || String(f.year) === year;
            const matchesMonth = !month || String(f.month) === month;
            const matchesPackage = !pkg || f.packageName === pkg;
            return matchesTerm && matchesCampaign && matchesYear && matchesMonth && matchesPackage;
        });
        displayGrid(filtered);
        updateFilterOptions();
    }

    document.getElementById('search-input').addEventListener('input', filterImages);
    document.getElementById('filter-year').addEventListener('change', filterImages);
    document.getElementById('filter-month').addEventListener('change', filterImages);
    document.getElementById('filter-package').addEventListener('change', filterImages);
    document.getElementById('filter-product').addEventListener('change', filterImages);

    window.onload = loadImages;
</script>
</body>
</html>
