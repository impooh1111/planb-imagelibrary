    :root{

    select, input{ font-weight:300; }

    .skeleton{ background-color: var(--surface-card); }
    .skeleton-pulse{ animation: pulse 1.6s ease-in-out infinite; }

    .image-card{ transition: transform .15s ease, border-color .15s ease; cursor:pointer; }
    .image-card:hover{ transform: translateY(-2px); border-color:#ffffff; }

    .btn-primary{ background:transparent; color:#fff; border:1px solid #fff; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; font-size:13px; }

<script>
    // === ตั้งค่าตรงนี้ ===
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzgtRxRa9eUZHS-31AQ7JSCd3LaGIbDa3IawUZTzT64PK5hOd__RCO3-c_aCre_5HBgYA/exec';
    // ====================

    let allFiles = [];

    const THAI_MONTHS = {
        'มกราคม': 1, 'กุมภาพันธ์': 2, 'มีนาคม': 3, 'เมษายน': 4,
        'พฤษภาคม': 5, 'มิถุนายน': 6, 'กรกฎาคม': 7, 'สิงหาคม': 8,
        'กันยายน': 9, 'ตุลาคม': 10, 'พฤศจิกายน': 11, 'ธันวาคม': 12
    };
    const ENG_MONTHS = { jan:1, feb:2, mar:3, apr:4, may:5, jun:6, jul:7, aug:8, sep:9, oct:10, nov:11, dec:12 };
    const MONTH_LABEL_TH = ['', 'มกราคม (Jan)', 'กุมภาพันธ์ (Feb)', 'มีนาคม (Mar)', 'เมษายน (Apr)', 'พฤษภาคม (May)', 'มิถุนายน (Jun)', 'กรกฎาคม (Jul)', 'สิงหาคม (Aug)', 'กันยายน (Sep)', 'ตุลาคม (Oct)', 'พฤศจิกายน (Nov)', 'ธันวาคม (Dec)'];

    function extractYearMonth(pathStr) {
        let year = null, month = null;
        if (!pathStr) return { year, month };

        for (const name in THAI_MONTHS) {
            if (pathStr.includes(name)) {
                month = THAI_MONTHS[name];
                const re = new RegExp(name + '\\s*(\\d{2})');
                const m = pathStr.match(re);
                if (m) year = 1957 + parseInt(m[1], 10);
                break;
            }
        }

        if (!month) {
            const re = /\b(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*\s*(\d{2,4})\b/i;
            const m = pathStr.match(re);
            if (m) {
                month = ENG_MONTHS[m[1].toLowerCase()];
                let y = parseInt(m[2], 10);
                if (y < 100) y = 2000 + y;
                year = y;
            }
        }

        if (!year) {
            const ym = pathStr.match(/\b(20\d{2})\b/);
            if (ym) year = parseInt(ym[1], 10);
        }

        return { year, month };
    }

    function extractPackage(pathStr) {
        if (!pathStr) return null;
        const m = pathStr.match(/Pic Retouch\s*@\s*([^\/]+)/i);
        return m ? m[1].trim() : null;
    }

    const CACHE_KEY = 'planb_image_cache_v1';
    const CACHE_MAX_AGE_MS = 10 * 60 * 1000; // 10 นาที

    function processData(data) {
        if (!Array.isArray(data)) {
            console.error('Unexpected response from APPS_SCRIPT_URL (not an array):', data);
            throw new Error('Invalid data format from backend');
        }
        return data.map(f => {
            const ym = extractYearMonth(f.path || f.campaign || '');
            const pkg = extractPackage(f.path || f.campaign || '');
            return { ...f, year: ym.year, month: ym.month, packageName: pkg };
        });
    }

    function loadImages() {
        // 1) โหลดจากแคชก่อนทันที (ถ้ามี) เพื่อให้เห็นรูปเร็วที่สุดโดยไม่ต้องรอ network
        let cached = null;
        try {
            const raw = sessionStorage.getItem(CACHE_KEY);
            if (raw) cached = JSON.parse(raw);
        } catch (e) { /* ignore corrupted cache */ }

        if (cached && Array.isArray(cached.data)) {
            allFiles = processData(cached.data);
            updateFilterOptions();
            displayGrid(allFiles);
        }

        // 2) ถ้าไม่มีแคช หรือแคชเก่าเกินไป ให้ดึงข้อมูลใหม่จาก network (stale-while-revalidate)
        const isFresh = cached && (Date.now() - cached.ts < CACHE_MAX_AGE_MS);
        if (isFresh) return;

        fetch(APPS_SCRIPT_URL)
            .then(res => {
                if (!res.ok) throw new Error('Network response was not ok');
                return res.json();
            })
            .then(data => {
                try {
                    sessionStorage.setItem(CACHE_KEY, JSON.stringify({ data, ts: Date.now() }));
                } catch (e) { /* storage full or unavailable, ignore */ }
                allFiles = processData(data);
                updateFilterOptions();
                displayGrid(allFiles);
            })
            .catch(err => {
                console.error(err);
                if (!cached) showSetupNotice();
            });
    }

    function getFilesForOptions(excludeKey) {
        const term = document.getElementById('search-input').value.toLowerCase();
        const campaign = document.getElementById('filter-product').value;
        const year = document.getElementById('filter-year').value;
        const month = document.getElementById('filter-month').value;
        const pkg = document.getElementById('filter-package').value;

        return allFiles.filter(f => {
            const nameMatch = (f.name || '').toLowerCase().includes(term);
            const pathMatch = (f.path || '').toLowerCase().includes(term);
            const matchesTerm = !term || nameMatch || pathMatch;
            const matchesCampaign = excludeKey === 'campaign' || !campaign || f.campaign === campaign;
            const matchesYear = excludeKey === 'year' || !year || String(f.year) === year;
            const matchesMonth = excludeKey === 'month' || !month || String(f.month) === month;
            const matchesPackage = excludeKey === 'package' || !pkg || f.packageName === pkg;
            return matchesTerm && matchesCampaign && matchesYear && matchesMonth && matchesPackage;
        });
    }

    function rebuildSelect(selectEl, values, allLabel, currentValue) {
        selectEl.innerHTML = `<option value="">${allLabel}</option>`;
        values.forEach(v => {
            const opt = document.createElement('option');
            opt.value = v.value;
            opt.textContent = v.label;
            selectEl.appendChild(opt);
        });
        if (currentValue && values.some(v => String(v.value) === currentValue)) {
            selectEl.value = currentValue;
        } else {
            selectEl.value = '';
        }
    }

    function updateFilterOptions() {
        const yearSelect = document.getElementById('filter-year');
        const monthSelect = document.getElementById('filter-month');
        const packageSelect = document.getElementById('filter-package');
        const campaignSelect = document.getElementById('filter-product');

        const prevYear = yearSelect.value;
        const prevMonth = monthSelect.value;
        const prevPackage = packageSelect.value;
        const prevCampaign = campaignSelect.value;

        const yearFiles = getFilesForOptions('year');
        const years = [...new Set(yearFiles.map(f => f.year).filter(Boolean))]
            .sort((a, b) => a - b)
            .map(y => ({ value: y, label: String(y) }));
        rebuildSelect(yearSelect, years, `📅 ทุกปี (${years.length})`, prevYear);

        const monthFiles = getFilesForOptions('month');
        const months = [...new Set(monthFiles.map(f => f.month).filter(Boolean))]
            .sort((a, b) => a - b)
            .map(m => ({ value: m, label: MONTH_LABEL_TH[m] }));
        rebuildSelect(monthSelect, months, `🌙 ทุกเดือน (${months.length})`, prevMonth);

        const packageFiles = getFilesForOptions('package');
        const packages = [...new Set(packageFiles.map(f => f.packageName).filter(Boolean))]
            .sort()
            .map(p => ({ value: p, label: p }));
        rebuildSelect(packageSelect, packages, `📦 ทุก Package (${packages.length})`, prevPackage);

        const campaignFiles = getFilesForOptions('campaign');
        const campaigns = [...new Set(campaignFiles.map(f => f.campaign).filter(Boolean))]
            .sort()
            .map(c => ({ value: c, label: c }));
        rebuildSelect(campaignSelect, campaigns, `🏷️ ทุกสินค้า (${campaigns.length})`, prevCampaign);
    }

    function showSetupNotice() {
        document.getElementById('loading-state').classList.add('hidden');
        document.getElementById('image-grid').classList.add('hidden');
        document.getElementById('empty-state').classList.add('hidden');
        document.getElementById('setup-notice').classList.remove('hidden');
    }

    function displayGrid(files) {
        document.getElementById('loading-state').classList.add('hidden');
        const grid = document.getElementById('image-grid');
        const empty = document.getElementById('empty-state');
        const count = document.getElementById('result-count');

        if (files.length === 0) {
            grid.classList.add('hidden');
            count.classList.add('hidden');
            empty.classList.remove('hidden');
            return;
        }

        empty.classList.add('hidden');
        count.classList.remove('hidden');
        count.textContent = `พบ ${files.length} รูปภาพ`;

        let gridHtml = '';
        files.forEach((file, i) => {
            // รูปแรก ๆ ที่อยู่เหนือ fold โหลดทันทีด้วย priority สูง ส่วนที่เหลือ lazy-load ตอนเลื่อนถึง
            const isAboveFold = i < 8;
            const loadingAttr = isAboveFold ? 'eager' : 'lazy';
            const priorityAttr = isAboveFold ? 'high' : 'low';
            // ขอ thumbnail ขนาดเล็กพอดีกับการ์ด (เร็วกว่าดึงไฟล์เต็ม) แล้วค่อยขยายผ่าน CSS
            const imgSrc = `https://drive.google.com/thumbnail?id=${file.id}&sz=w300`;
            const pathParts = (file.path || file.campaign || '').split(' / ').filter(Boolean);
            const breadcrumbHtml = pathParts.map(p => `<span class="label-uppercase px-2 py-0.5 border" style="border-color:var(--hairline); color:var(--muted); font-size:10px; letter-spacing:1px;">${p}</span>`).join('');
            gridHtml += `
                <div class="image-card surface-card overflow-hidden" onclick="window.open('https://drive.google.com/file/d/${file.id}/view', '_blank')">
                    <div class="w-full aspect-[4/3] overflow-hidden surface-soft">
                        <img src="${imgSrc}" alt="${(file.name || '').replace(/"/g, '&quot;')}" loading="${loadingAttr}" decoding="async" fetchpriority="${priorityAttr}" width="300" height="225" class="w-full h-full object-cover" onerror="this.onerror=null;this.src='${imgSrc}&t='+Date.now();">
                    </div>
                    <div class="p-4 space-y-2">
                        <div class="text-white text-sm font-bold truncate" title="${file.name}">${file.name}</div>
                        <div class="flex flex-wrap gap-1.5">${breadcrumbHtml}</div>
                    </div>
                </div>
            `;
        });

        grid.innerHTML = gridHtml;
        grid.classList.remove('hidden');
    }

    function filterImages() {
        const term = document.getElementById('search-input').value.toLowerCase();
        const campaign = document.getElementById('filter-product').value;
        const year = document.getElementById('filter-year').value;
        const month = document.getElementById('filter-month').value;
        const pkg = document.getElementById('filter-package').value;

        const filtered = allFiles.filter(f => {
            const nameMatch = (f.name || '').toLowerCase().includes(term);
            const pathMatch = (f.path || '').toLowerCase().includes(term);
            const matchesTerm = !term || nameMatch || pathMatch;
            const matchesCampaign = !campaign || f.campaign === campaign;
            const matchesYear = !year || String(f.year) === year;
            const matchesMonth = !month || String(f.month) === month;
            const matchesPackage = !pkg || f.packageName === pkg;
            return matchesTerm && matchesCampaign && matchesYear && matchesMonth && matchesPackage;
        });
        displayGrid(filtered);
        updateFilterOptions();
    }

    document.getElementById('search-input').addEventListener('input', filterImages);
    document.getElementById('filter-year').addEventListener('change', filterImages);
    document.getElementById('filter-month').addEventListener('change', filterImages);
    document.getElementById('filter-package').addEventListener('change', filterImages);
    document.getElementById('filter-product').addEventListener('change', filterImages);

    window.onload = loadImages;
</script>
</body>
</html>
